on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.helm/**'
    jobs:
      code quality:
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v3
          - name: Run golangci-lint
            uses: golangci/golangci-lint-action@v6
            with:
              go-version: 'v1.56.2'